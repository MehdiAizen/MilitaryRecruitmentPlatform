apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: military-app
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: military-app
spec:
  selector:
    app: military-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: military-app
spec:
  selector:
    app: military-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer