apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: military-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'spring-boot-app'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: military-backend
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod