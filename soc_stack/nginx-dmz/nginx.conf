# nginx-dmz/nginx.conf
# Nginx en ZONE DMZ — Point d'entrée sécurisé
# Ce fichier N'A RIEN À VOIR avec le nginx de ton frontend React
# Son rôle : filtrer le trafic malveillant AVANT d'atteindre ton app

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    # ─── Format de log détaillé pour le SIEM ───────────────
    log_format siem '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'upstream_addr=$upstream_addr';

    access_log /var/log/nginx/access.log siem;

    # ─── Rate limiting global (protection DDoS) ─────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── Sécurité de base ───────────────────────────────────
    server_tokens off;             # Cacher la version Nginx
    client_max_body_size 10m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    server {
        listen 80;
        server_name _;

        # ─── Headers de sécurité sur toutes les réponses ────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # ─── Bloquer les user-agents malveillants ───────────
        if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|python-requests)) {
            return 403;
        }

        # ─── Bloquer les tentatives d'injection SQL dans l'URL
        if ($request_uri ~* "(union|select|insert|drop|update|delete|create|alter)") {
            return 403;
        }

        # ─── Bloquer XSS dans l'URL ─────────────────────────
        if ($request_uri ~* "(<script|javascript:|vbscript:|onload=)") {
            return 403;
        }

        # ─── Rate limit global ──────────────────────────────
        limit_req zone=global burst=50 nodelay;
        limit_conn addr 10;

        # ─── Proxy vers ton frontend React ──────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Proxy vers ton backend Spring Boot ─────────────
        # Rate limit STRICT sur le login
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Autres routes API
        location /api {
            limit_req zone=global burst=100 nodelay;
            proxy_pass http://backend:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Bloquer l'accès aux fichiers cachés ────────────
        location ~ /\. {
            deny all;
            access_log off;
        }

        # ─── Health check pour le monitoring ────────────────
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
