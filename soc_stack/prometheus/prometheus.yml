# prometheus/prometheus.yml
# Prometheus collecte les métriques de TOUS tes services
# Il "scrape" (interroge) chaque service toutes les 15 secondes

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ─── Ton application Spring Boot ────────────────────────────
  # Spring Boot Actuator expose /actuator/prometheus automatiquement
  - job_name: 'military-backend'
    static_configs:
      - targets: ['backend:8081']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ─── PostgreSQL ──────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ─── Métriques système (CPU, RAM, disque) ───────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ─── Nginx DMZ ───────────────────────────────────────────────
  - job_name: 'nginx-dmz'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # ─── Prometheus lui-même ─────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Elasticsearch ───────────────────────────────────────────
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_prometheus/metrics'
