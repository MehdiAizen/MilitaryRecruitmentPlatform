# logstash/pipeline/military-platform.conf
# Logstash reçoit les logs de Filebeat, les enrichit, et les envoie à Elasticsearch

input {
  # Reçoit de Filebeat
  beats {
    port => 5044
  }
}

filter {

  # ─── Traitement des logs Spring Boot (ton backend) ──────────
  if [container][name] =~ "backend" or [container][name] =~ "military" {
    mutate { add_field => { "source_app" => "military-recruitment-backend" } }

    # Parse le JSON de Spring Boot si pas encore parsé
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "spring_log"
      }
    }

    # Extraire le niveau de log
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level}"
      }
    }

    # Alerter sur les erreurs de sécurité
    if [message] =~ "IP bloquée" or [message] =~ "rate limit" {
      mutate { add_field => { "security_event" => "rate_limit_triggered" } }
    }

    if [message] =~ "Authentication failed" or [message] =~ "Bad credentials" {
      mutate { add_field => { "security_event" => "auth_failure" } }
    }
  }

  # ─── Traitement des logs Suricata (alertes réseau) ──────────
  if [log_type] == "suricata" {
    mutate { add_field => { "source_app" => "suricata-ids" } }

    # Enrichir les alertes Suricata
    if [event_type] == "alert" {
      mutate {
        add_field => { "security_event" => "network_intrusion_attempt" }
        add_tag => ["security_alert", "suricata"]
      }
    }
  }

  # ─── Traitement des logs Nginx DMZ ──────────────────────────
  if [log_type] == "nginx-dmz" {
    mutate { add_field => { "source_app" => "nginx-dmz" } }

    # Parser le format de log personnalisé défini dans nginx.conf
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{DATA:request_uri} HTTP/%{NUMBER}" %{NUMBER:status_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referer}" "%{DATA:user_agent}" rt=%{NUMBER:response_time:float}'
      }
    }

    # Marquer les 403 comme tentatives bloquées
    if [status_code] == 403 {
      mutate {
        add_field => { "security_event" => "request_blocked_waf" }
        add_tag => ["blocked", "security_alert"]
      }
    }

    # Détecter les codes d'erreur serveur
    if [status_code] >= 500 {
      mutate { add_tag => ["server_error"] }
    }
  }

  # ─── Enrichissement commun à tous les logs ──────────────────
  mutate {
    add_field => { "project" => "military-recruitment-platform" }
    add_field => { "environment" => "${APP_ENV:development}" }
  }

  # Nettoyer les champs inutiles
  mutate {
    remove_field => ["agent", "ecs", "input"]
  }
}

output {
  # ─── Envoi vers Elasticsearch ───────────────────────────────
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # Index différent par type de log pour faciliter les recherches dans Kibana
    index => "military-%{[source_app]}-%{+YYYY.MM.dd}"
  }

  # ─── Debug en dev (affiche dans les logs de Logstash) ───────
  # Commenter en production
  stdout {
    codec => rubydebug
  }
}
