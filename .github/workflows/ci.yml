name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests -Dfile.encoding=UTF-8

      - name: Build Docker image
        run: docker build -t military-recruitment-backend:${{ github.sha }} .

    # Ici on pourrait faire un 'docker push' vers un registry (DockerHub ou GHCR)