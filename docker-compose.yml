services:
  postgres:
    image: postgres:15-alpine
    container_name: military-postgres
    environment:
      POSTGRES_DB: military_recruitment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - military-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: military-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/military_recruitment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password_dev
      JWT_SECRET: cle_secrete_militaire_tres_longue_minimum_32_caracteres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FRONTEND_URL: http://localhost:3000
      MAIL_USERNAME: sageaizen007@gmail.com
      MAIL_PASSWORD: REMPLACE_PAR_MOT_DE_PASSE_APP_GMAIL
    ports:
      - "8081:8081"
    volumes:
      # FIX: volume persistant pour les fichiers uploadés
      # Sans ça, les fichiers disparaissent à chaque docker compose down
      - uploads_data:/app/uploads
    networks:
      - military-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: military-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - military-network

networks:
  military-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:   # FIX: volume ajouté pour persister les fichiers uploadés